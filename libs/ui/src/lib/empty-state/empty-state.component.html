<section class="c-empty-state o-flex o-flex--col o-flex--align-items-center o-flex--justify-content-center o-layout--gap-3">
  <div class="c-empty-state__art" aria-hidden="true">
    <img class="c-empty-state__illustration" [src]="illustrationSrc" alt="" />
  </div>

  <div class="c-empty-state__content o-flex o-flex--col o-flex--align-items-center o-layout--gap-1">
    <h3 class="c-empty-state__title o-layout--margin-0">{{ title() }}</h3>

    @if (description()) {
      <p class="c-empty-state__description o-layout--margin-0">{{ description() }}</p>
    }
  </div>
</section>
