@if (isLarge()) {
  <img
    class="c-plectrum-avatar__illustration"
    [src]="illustrationSrc()"
    alt=""
    aria-hidden="true"
  />
} @else {
  <svg
    class="c-plectrum-avatar__shape"
    width="29.33"
    height="32"
    viewBox="0 0 29.33 32"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
    aria-hidden="true"
    focusable="false"
  >
    <path
      class="c-plectrum-avatar__shape-path"
      d="M14.7238 31.7323C23.7921 28.7137 31.6631 10.9279 28.6919 3.83162C25.5095 -3.77168 5.81893 1.46474 1.26346 6.4273C-3.39809 11.506 5.68416 34.7406 14.7238 31.7323Z"
    />
  </svg>

  <span class="c-plectrum-avatar__initials" aria-hidden="true">
    {{ initials().toUpperCase() }}
  </span>
}
