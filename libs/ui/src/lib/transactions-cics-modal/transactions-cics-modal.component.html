<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [dismissableMask]="true"
  [draggable]="false"
  [resizable]="false"
  header="Transactions CICS"
  (onHide)="onHide()"
>
  <div class="c-transactions-cics-modal__content o-flex o-flex--y o-layout--gap-3 o-layout--min-w-0">
    <p-message
      severity="warn"
      icon="bi bi-exclamation-triangle-fill"
      text="Les transactions CICS s'ouvrent dans une application externe. Vérifiez que vous êtes connecté à CICS avant de lancer une transaction."
    />

    <p-iconfield class="c-transactions-cics-modal__search">
      <p-inputicon>
        <i class="bi bi-search" aria-hidden="true"></i>
      </p-inputicon>
      <input
        pInputText
        type="search"
        role="searchbox"
        autocomplete="off"
        placeholder="Rechercher une transaction..."
        class="c-transactions-cics-modal__search-input o-layout--full-width"
        [ngModel]="searchQuery()"
        (ngModelChange)="onSearchChange($event)"
        aria-label="Rechercher une transaction CICS"
        data-telemetry-id="cics-modal-search"
      />
    </p-iconfield>

    <p-table
      class="c-transactions-cics-modal__table o-layout--full-width"
      [value]="filteredRows()"
      [paginator]="false"
      dataKey="code"
    >
      <ng-template #header>
        <tr>
          <th scope="col">Transaction</th>
          <th scope="col">Description</th>
          <th scope="col">Actions</th>
        </tr>
      </ng-template>
      <ng-template #body let-row>
        <tr>
          <td>{{ row.code }}</td>
          <td>{{ row.description }}</td>
          <td>
            <button
              pButton
              type="button"
              severity="secondary"
              size="small"
              icon="bi bi-box-arrow-up-right"
              label="CICS"
              [attr.aria-label]="'Lancer ' + row.code + ' dans CICS'"
              [attr.data-telemetry-id]="'cics-launch-' + row.code"
              (click)="onLaunch(row)"
            ></button>
          </td>
        </tr>
      </ng-template>
      <ng-template #emptymessage>
        <tr>
          <td colspan="3">Aucune transaction ne correspond à votre recherche.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</p-dialog>
