<div class="c-doc-demo-box o-layout--margin-block-2">
  <!-- Live preview area -->
  <div
    class="c-doc-demo-box__preview o-layout--padding-2"
    [style.min-height.px]="minHeight() || null"
  >
    <ng-content />
  </div>

  <!-- Show / Hide code toggle -->
  @if (code()) {
    <div class="c-doc-demo-box__footer o-flex o-flex--justify-content-flex-end o-layout--padding-block-0-5 o-layout--padding-inline-1">
      <button
        class="c-doc-demo-box__toggle"
        type="button"
        [attr.aria-expanded]="codeVisible()"
        (click)="toggleCode()"
      >
        {{ codeVisible() ? 'Hide code' : 'Show code' }}
      </button>
    </div>

    @if (codeVisible()) {
      <pre class="c-doc-demo-box__code o-layout--padding-2 o-layout--overflow-x-auto o-layout--margin-0"><code>{{ code() }}</code></pre>
    }
  }
</div>
