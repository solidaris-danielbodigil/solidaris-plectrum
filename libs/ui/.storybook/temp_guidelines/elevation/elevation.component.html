<div class="o-flex o-flex--col o-layout o-layout--gap-2">
  <h3 class="typo__h3">Combine Values</h3>
  <fba-card class="o-flex o-flex--y o-layout o-layout--gap-3" elevated="true">
    <fba-search-bar class="o-flex o-layout o-layout--gap-3">
      <fba-form-field label="Type" class="o-flex__item">
        <fba-autocomplete
          (optionSelected)="elevationTypeValue = getElevationType($event)"
          (removeSelectedOption)="removeTypeValue()"
          [noClear]="false"
          [options]="typesList"
          [selectedOptions]="elevationTypeValue"
          maxVisibleOptions="15"
          placeholder="Enter an elevation type"
        />
      </fba-form-field>

      <fba-form-field class="o-flex__item" label="Scale">
        <fba-autocomplete
          [disabled]="!elevationTypeValue || scaleList.length === 0"
          (optionSelected)="elevationScaleValue = getElevationScale($event)"
          [options]="scaleList"
          placeholder="Enter an elevation scale"
          [selectedOptions]="elevationScaleValue"
          [noClear]="true"
          maxVisibleOptions="15"
          (removeSelectedOption)="removeScaleValue()"
        />
      </fba-form-field>

      <fba-form-field label="Shadow" class="o-flex__item">
        <fba-switch
          [disabled]="!elevationTypeValue"
          [toggled]="shadow"
          (toggleClick)="isElevationShadow()"
        />
      </fba-form-field>

      <fba-form-field
        class="o-flex__item"
        [fused]="true"
        [validationMarker]="'optional-text'"
        label="Direction"
      >
        <fba-autocomplete
          class="autocomplete__borders-directions"
          (optionSelected)="
            elevationDirectionValue = getElevationDirection($event)
          "
          (removeSelectedOption)="removeDirectionValue()"
          [disabled]="!shadow || !elevationTypeValue"
          [options]="directionsList"
          [selectedOptions]="elevationDirectionValue"
          maxVisibleOptions="15"
          placeholder="Enter a shadow direction"
          [optionIcon]="true"
        />
      </fba-form-field>
    </fba-search-bar>
  </fba-card>

  <!--<h3 class="typo__h3">Result</h3>-->

  <fba-card
    (click)="
      copyElevationValue(
        (elevationTypeValue ? '@extend %u-elevation--' : '') +
          elevationClass +
          (elevationTypeValue ? ';' : '')
      )
    "
    [clickable]="true"
    [outlined]="true"
    class="foundations-tokens__item o-flex o-flex--col foundations-tokens__item--semantic"
  >
