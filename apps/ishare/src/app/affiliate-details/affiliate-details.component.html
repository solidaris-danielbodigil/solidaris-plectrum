<div
  class="c-affiliate-details o-flex o-flex--y o-layout--gap-2 o-layout--full-height o-layout--min-w-0 o-layout--min-h-0"
>
  <sds-toolbar
    class="c-affiliate-details__toolbar c-affiliate-documents-toolbar o-layout--full-width o-flex__item--shrink-0"
    [sticky]="true"
  >
    <ng-container slot="start">
      <div
        class="c-affiliate-documents-toolbar__row o-flex o-flex--row-wrap o-flex--align-items-flex-start o-layout--gap-3 o-layout--full-width o-layout--min-w-0"
      >
        <div class="c-affiliate-documents-toolbar__field">
          <sds-form-field label="Rechercher" inputId="document-search">
            <p-iconfield class="c-affiliate-documents-toolbar__field-input">
              <p-inputicon>
                <i class="bi bi-search" aria-hidden="true"></i>
              </p-inputicon>
              <input
                pInputText
                type="text"
                role="searchbox"
                autocomplete="off"
                id="document-search"
                name="documentSearch"
                [ngModel]="documentSearch()"
                (ngModelChange)="documentSearch.set($event)"
                pSize="small"
                placeholder="Rechercher document..."
                class="c-affiliate-documents-toolbar__field-input"
              />
              <p-inputicon>
                <sds-input-clear
                  [visible]="!!documentSearch()"
                  ariaLabel="Effacer la recherche"
                  (clear)="clearDocumentSearch()"
                />
              </p-inputicon>
            </p-iconfield>
          </sds-form-field>
        </div>

        <div class="c-affiliate-documents-toolbar__field">
          <sds-form-field label="Secteur" inputId="document-sector">
            <p-autocomplete
              inputId="document-sector"
              name="documentSector"
              [(ngModel)]="selectedSector"
              [suggestions]="sectorSuggestions"
              (completeMethod)="filterSectors($event)"
              optionLabel="label"
              dataKey="value"
              [dropdown]="true"
              [forceSelection]="true"
              [showClear]="true"
              placeholder="Sélectionnez un secteur"
              size="small"
              fluid
            ></p-autocomplete>
          </sds-form-field>
        </div>

        <div class="c-affiliate-documents-toolbar__field">
          <sds-form-field label="Trier par" inputId="document-sort">
            <p-autocomplete
              inputId="document-sort"
              name="documentSort"
              [ngModel]="selectedSort()"
              (ngModelChange)="selectedSort.set($event)"
              [suggestions]="sortSuggestions"
              (completeMethod)="filterSortOptions($event)"
              optionLabel="label"
              dataKey="value"
              [dropdown]="true"
              [forceSelection]="true"
              [showClear]="true"
              placeholder="Sélectionnez un tri"
              size="small"
              fluid
            ></p-autocomplete>
          </sds-form-field>
        </div>

        <div
          class="c-affiliate-documents-toolbar__field c-affiliate-documents-toolbar__field--auto"
        >
          <sds-form-field label="Vue parcours" inputId="journey-view">
            <p-toggleswitch
              inputId="journey-view"
              name="journeyView"
              [(ngModel)]="journeyView"
            />
          </sds-form-field>
        </div>

        <div
          class="c-affiliate-documents-toolbar__field c-affiliate-documents-toolbar__field--auto"
        >
          <sds-form-field
            label="Documents archivés seulement"
            inputId="archived-only"
          >
            <p-toggleswitch
              inputId="archived-only"
              name="archivedOnly"
              [ngModel]="archivedOnly()"
              (ngModelChange)="archivedOnly.set($event)"
            />
          </sds-form-field>
        </div>
      </div>
    </ng-container>
  </sds-toolbar>

  <div
    class="c-affiliate-details__columns o-flex o-flex--y o-flex--row@lg o-layout--gap-2 o-layout--full-width o-layout--min-w-0 o-layout--min-h-0 o-flex__item--grow-1"
  >
    <p-card
      class="c-affiliate-details__documents o-flex o-flex--y o-layout--min-w-0 o-layout--min-h-0 o-flex__item--5 o-flex__item--shrink-1 o-layout--padding-3 o-layout--gap-3"
    >
      <ng-template pTemplate="header">
        <div
          class="c-affiliate-details__card-header o-flex o-flex--align-items-center o-flex--justify-content-space-between o-layout--gap-2"
        >
          <div class="o-flex o-flex--align-items-center o-layout--gap-1-5">
            <h2 class="c-affiliate-details__documents-title">
              Suivi des documents
            </h2>
            <span
              class="c-affiliate-details__documents-count o-flex o-flex--align-items-center o-flex--justify-content-center"
              >{{ documentCount }}</span
            >
          </div>
          <button
            pButton
            type="button"
            text
            severity="secondary"
            class="c-affiliate-details__documents-sort"
            [icon]="startDateSortIcon()"
            [attr.aria-label]="startDateSortAriaLabel()"
            (click)="toggleStartDateSort()"
          ></button>
        </div>
      </ng-template>

      @if (hasListResults) {
        <sds-list
          class="o-flex o-flex--y o-flex__item--grow-1 o-layout--full-width o-layout--min-w-0"
          [showHeader]="false"
          [groups]="listGroups"
          [items]="listItems"
          [expandedGroupIds]="expandedGroupIds()"
          [selectedItemId]="selectedDocumentId()"
          (expandedGroupIdsChange)="onExpandedGroupIdsChange($event)"
          (itemClick)="onDocumentClick($event)"
          (tagTargetClick)="onTagTargetClick($event)"
        />
      } @else {
        <sds-empty-state
          class="o-flex o-flex--col o-flex__item--grow-1 o-layout--full-width o-layout--min-w-0"
          title="Aucun document trouvé"
          description="Aucun document ne correspond aux filtres sélectionnés."
        />
      }
    </p-card>

    @if (visibleDocuments().length > 0) {
      <p-card
        class="c-affiliate-details__detail o-flex o-flex--y o-layout--min-w-0 o-layout--min-h-0 o-flex__item--7 o-flex__item--shrink-1 o-layout--padding-3 o-layout--gap-3"
        [class.c-affiliate-details__detail--empty]="!selectedDocumentId()"
      >
        @if (selectedDocumentId(); as documentId) {
          <ng-template pTemplate="header">
            @if (documentDetail.documentDetail(); as detail) {
              <div
                class="c-affiliate-details__card-header o-flex o-flex--align-items-center o-layout--gap-2"
              >
                <h2
                  class="c-affiliate-document-detail__title o-flex__item--grow-1 o-layout--min-w-0"
                >
                  {{ documentDetail.documentTitle() }}
                </h2>

                <div
                  class="c-affiliate-document-detail__nav o-flex o-flex--align-items-center o-layout--gap-1 o-flex__item--shrink-0"
                >
                  <button
                    pButton
                    type="button"
                    severity="secondary"
                    size="small"
                    icon="bi bi-skip-backward"
                    [disabled]="!documentDetail.canGoToPreviousDocument()"
                    aria-label="Document précédent"
                    (click)="documentDetail.goToPreviousDocument()"
                  ></button>
                  <button
                    pButton
                    type="button"
                    severity="secondary"
                    size="small"
                    icon="bi bi-skip-forward"
                    [disabled]="!documentDetail.canGoToNextDocument()"
                    aria-label="Document suivant"
                    (click)="documentDetail.goToNextDocument()"
                  ></button>
                </div>
              </div>
            }
          </ng-template>

          <app-affiliate-document-detail
            #documentDetail
            class="o-layout--full-width o-layout--min-w-0"
            [selectedDocumentId]="documentId"
            [visibleDocuments]="visibleDocuments()"
            [focusTarget]="documentFocus()"
            (selectedDocumentIdChange)="onSelectedDocumentIdChange($event)"
            (moreDetailsOpen)="onMoreDetailsOpen($event)"
          />
        } @else {
          <sds-empty-state
            class="c-affiliate-details__detail-empty o-layout--full-width o-layout--min-w-0"
            title="Aucun document sélectionné"
            description="Développez un parcours et sélectionnez un document pour afficher son détail."
          />
        }
      </p-card>
    }
  </div>

</div>

<sds-affiliate-detail-drawer
  [(visible)]="affiliateDetailDrawerVisible"
  [data]="affiliateDetailDrawerData()"
  (identifierCopy)="onDrawerIdentifierCopy($event)"
  (menuClick)="onDrawerMenuClick()"
  (quickActionsClick)="onDrawerQuickActionsClick()"
/>

<app-document-more-details-drawer
  [(visible)]="moreDetailsDrawerVisible"
  [panel]="moreDetailsPanel()"
/>
