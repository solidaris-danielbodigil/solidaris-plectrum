<div class="o-flex o-flex--y o-flex--row@lg o-layout--gap-2 o-layout--full-height o-layout--min-w-0 o-layout--min-h-0">
  <p-card class="c-affiliate-search-panel o-flex o-flex__item--shrink-0 o-layout--full-height o-layout--min-w-0" header="Recherche d'affilié">
    <form class="o-flex o-flex--y o-layout--gap-3 o-layout--min-w-0" #searchForm="ngForm" (ngSubmit)="submitSearch(searchForm)" novalidate>
      <sds-form-field
        label="O.A."
        [required]="true"
        [invalid]="isFieldInvalid(searchForm, 'office')"
        errorMessage="Sélectionnez une O.A."
      >
        <p-autocomplete
          #office="ngModel"
          name="office"
          [(ngModel)]="selectedOffice"
          [suggestions]="officeSuggestions"
          (completeMethod)="filterOffices($event)"
          optionLabel="label"
          dataKey="value"
          [dropdown]="true"
          [forceSelection]="true"
          [showClear]="true"
          [invalid]="isFieldInvalid(searchForm, 'office')"
          placeholder="Selectionnez une O.A."
          required
          fluid
        ></p-autocomplete>
      </sds-form-field>

      <sds-form-field
        label="Type de recherche"
        [required]="true"
        [invalid]="isFieldInvalid(searchForm, 'searchType')"
        errorMessage="Sélectionnez un type de recherche."
      >
        <p-selectbutton
          #searchType="ngModel"
          name="searchType"
          [(ngModel)]="selectedSearchType"
          [options]="searchTypes"
          optionLabel="label"
          optionValue="value"
          [allowEmpty]="false"
          [invalid]="isFieldInvalid(searchForm, 'searchType')"
          required
          fluid
        ></p-selectbutton>
      </sds-form-field>

      <sds-form-field
        [label]="searchIdentifierLabel"
        [required]="true"
        [invalid]="isFieldInvalid(searchForm, 'identifier')"
        errorMessage="Ce champ est obligatoire."
      >
        <p-inputgroup class="c-affiliate-search-panel__query o-layout--full-width">
          <p-iconfield class="c-affiliate-search-panel__query-field">
            <input
              #identifier="ngModel"
              pInputText
              name="identifier"
              [(ngModel)]="searchIdentifier"
              [invalid]="isFieldInvalid(searchForm, 'identifier')"
              [placeholder]="searchIdentifierPlaceholder"
              required
            />
            <p-inputicon>
              <sds-input-clear
                [visible]="!!searchIdentifier"
                ariaLabel="Effacer la référence"
                (clear)="clearSearchIdentifier()"
              />
            </p-inputicon>
          </p-iconfield>
          <button
            pButton
            type="submit"
            class="c-affiliate-search-panel__query-submit"
            label="Chercher"
            icon="bi bi-search"
            [disabled]="!searchIdentifier.trim()"
          ></button>
        </p-inputgroup>
      </sds-form-field>
    </form>
  </p-card>

  <p-card class="o-flex o-flex__item--grow-1 o-layout--full-height o-layout--min-w-0" header="Détails du document">
    <sds-empty-state
      class="o-flex o-flex--col o-flex__item--grow-1"
      title="Aucun résultat pour l'instant"
      description="Lancez une recherche pour afficher le détail du document et les actions disponibles."
    ></sds-empty-state>
  </p-card>
</div>
